services:
  postgres:
    image: postgres:16
    container_name: ai_postgres
    restart: always
    environment:
      POSTGRES_DB: ai_assistant
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: strongpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: ai_redis
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../backend
    container_name: ai_backend
    restart: always
    env_file:
      - ../.env
    volumes:
      - task_storage:/storage
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ../backend
    container_name: ai_worker
    restart: always
    env_file:
      - ../.env
    command: ["python", "-m", "app.worker_runtime"]
    volumes:
      - task_storage:/storage
    depends_on:
      - postgres
      - redis

  bot:
    build:
      context: ../bot
    container_name: ai_bot
    restart: always
    env_file:
      - ../.env
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  task_storage:
